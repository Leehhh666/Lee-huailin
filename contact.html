<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Lee</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="contact-page">
    <canvas id="bg-canvas"></canvas>
    <nav>
        <div class="logo">LEE<span>(polyu)</span></div>
        <div class="nav-right">
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="projects.html">项目展示集</a>
                <a href="background.html">个人背景</a>
                <a href="about.html">关于我</a>
                <a href="contact.html" class="active">联系我</a>
            </div>
        </div>
        <button class="hamburger" id="hamburger" aria-label="导航菜单" aria-expanded="false" type="button">&#9776;</button>
    </nav>
    <div class="container">
        <h2 class="section-title">GET IN TOUCH</h2>
        <div class="contact-shell reveal">
            <div class="c-grid">
                <div class="c-box">
                    <small>GitHub</small>
                    <a href="https://github.com/Leehhh666" target="_blank" rel="noopener noreferrer" aria-label="GitHub: Leehhh666 (opens in new window)">github.com/Leehhh666</a>
                </div>
                <div class="c-box">
                    <small>University Email</small>
                    <div class="contact-line">
                        <span id="uni-email">25097331d@connect.polyU.hk</span>
                        <button class="copy-btn" type="button" data-copy-target="uni-email">复制</button>
                    </div>
                </div>
                <div class="c-box">
                    <small>Personal Email</small>
                    <div class="contact-line">
                        <span id="personal-email">2039167877@qq.com</span>
                        <button class="copy-btn" type="button" data-copy-target="personal-email">复制</button>
                    </div>
                </div>
                <div class="c-box">
                    <small>Mobile Phone</small>
                    <div class="contact-line">
                        <span id="mobile-phone">+86 136 1832 2879</span>
                        <button class="copy-btn" type="button" data-copy-target="mobile-phone">复制</button>
                    </div>
                </div>
            </div>
            <aside class="maker-panel">
                <h3>Maker Console</h3>
                <p id="maker-tip">系统在线——好用就行，不用过度设计。</p>
                <div class="console-actions">
                    <button class="mini-btn" id="tip-refresh" type="button">随机灵感</button>
                    <button class="mini-btn" id="theme-toggle" type="button">切换钢铁模式</button>
                </div>
                <div class="signal-group">
                    <div class="signal-item">
                        <span>创意电量</span>
                        <div class="signal-bar"><i data-level="84"></i></div>
                    </div>
                    <div class="signal-item">
                        <span>机械精度</span>
                        <div class="signal-bar"><i data-level="92"></i></div>
                    </div>
                    <div class="signal-item">
                        <span>执行效率</span>
                        <div class="signal-bar"><i data-level="88"></i></div>
                    </div>
                </div>
                <div class="console-status" id="console-status">状态：Ready · Maker Mode</div>
            </aside>
        </div>
    </div>
    <button class="floating-top" id="to-top" title="返回顶部" aria-label="返回顶部" type="button">↑</button>
    <div class="container" style="padding-top: 0;">
        <div class="footer-note">动手为主，少废话。</div>
    </div>
    <script src="main.js"></script>
</body>
</html>
